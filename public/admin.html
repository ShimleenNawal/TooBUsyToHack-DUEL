<!DOCTYPE html>

<body>
<h2 class="type-writer"> Hello, Admin </h2>
<div class="button-container">
  <a href="task-create.html">
    <button class="btn-task">Create Task</button>
  </a>
  <a href="submissions.html">
    <button class="btn-rivals">Submissions</button>
  </a>

<!-- Create Task Modal -->
<div class="modal" id="createTaskModal">
    <div class="modal-content">
        <div class="modal-header">
            <span class="task-label">Create Task</span>
            <button class="close-btn" id="closeCreateTask">&times;</button>
        </div>
        <form>
       <input type="text" placeholder="Enter task name">
       <button type="submit">Create</button>
       </form>
    </div>
</div>


<!-- Submissions Modal -->
<div class="modal" id="submissionModal">

</div>
